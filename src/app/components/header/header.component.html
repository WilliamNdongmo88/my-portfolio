<header class="header">
  <nav class="container nav-bar">
    <div class="logo">WN</div>
    
    <!-- Menu Desktop -->
    <ul class="nav-links desktop-menu">
      <li><a routerLink="/" [routerLinkActiveOptions]="{exact: true}" routerLinkActive="active">Accueil</a></li>
      <li><a href="#about" (click)="scrollToSection('about')">À propos</a></li>
      <li><a href="#skills" (click)="scrollToSection('skills')">Compétences</a></li>
      <li><a href="#projects" (click)="scrollToSection('projects')">Projets</a></li>
      <li><a routerLink="/blog" routerLinkActive="active">Blog</a></li>
      <li><a routerLink="/contact" routerLinkActive="active">Contact</a></li>
    </ul>
    
    <!-- Menu Mobile Hamburger -->
    <button class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>
    
    <!-- Menu Mobile Dropdown -->
    <div class="mobile-menu" [class.open]="isMenuOpen">
      <ul class="nav-links mobile-nav">
        <li><a routerLink="/" [routerLinkActiveOptions]="{exact: true}" routerLinkActive="active" (click)="closeMenu()">Accueil</a></li>
        <li><a href="#about" (click)="closeMenuAndScroll('about')">À propos</a></li>
        <li><a href="#skills" (click)="closeMenuAndScroll('skills')">Compétences</a></li>
        <li><a href="#projects" (click)="closeMenuAndScroll('projects')">Projets</a></li>
        <li><a routerLink="/blog" routerLinkActive="active" (click)="closeMenu()">Blog</a></li>
        <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
      </ul>
      <div class="social-links-mobile">
        <a href="https://github.com/WilliamNdongmo88" target="_blank" (click)="closeMenu()">GitHub</a>
      </div>
    </div>
    
    <div class="social-links desktop-social">
      <a href="https://github.com/WilliamNdongmo88" target="_blank">GitHub</a>
    </div>
  </nav>
</header>
